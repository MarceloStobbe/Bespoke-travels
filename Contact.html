<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcelo Stobbe - Bespoke Travels</title>
    <meta name="description" content="Marcelo Stobbe Bespoke Travels - Viagens personalizadas">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>


    <header class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="img/Logo.png" alt="Marcelo Stobbe Bespoke Travels" height="180">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto custom-nav-list">
                    <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
                    <li class="nav-item"><a href="Contact.html" class="nav-link">Contact</a></li>
                </ul>
            </div>
        </div>
        </nav>
    </header>

    <main
        <div class="card mb-0" id="about">
            <div class="card-body py-4">

                <h2 class="card-title text-center mb-4">Contact Information</h2>

                <fieldset>
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input class="form-control" id="fullName" placeholder="Please type your full name" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input class="form-control" type="email" id="email" placeholder="Please insert a valid email"
                            required>
                        <small id="emailHelp" class="text-muted">We will never share your email.</small>
                    </div>

                    <div class="mb-3">
                        <label for="subject" class="form-label">Subject</label>
                        <input class="form-control" type="text" id="subject" placeholder="What are you contact about?"
                            required>
                    </div>

                    <div class="mb-4">
                        <label for="message" class="form-label">Message</label>
                        <textarea id="message" class="form-control" placeholder="Enter your message here" rows="10"
                            required></textarea>
                    </div>
                </fieldset>

                <button type="submit" class="btn btn-custom-send w-25">Send</button>
            </div>

        </div>

    </main>

    <footer class="text-white text-center py-4 custom-footer">
        <div class="container">
            <p class="mb-1">2026 Marcelo Stobbe | Bespoke Travels</p>
            <p class="mb-2">
                <a href="mailto:contact@bespoketravels.com" class="footer-email-link">
                    contact@bespoketravels.com
                </a>
            </p>
            <small>&copy; All Rights Reserved</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
